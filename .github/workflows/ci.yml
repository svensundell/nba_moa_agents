name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nba_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nba_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nba_test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend
        working-directory: backend
        run: uv sync --extra dev

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check . && uv run ruff format --check .

      - name: Mypy
        working-directory: backend
        run: uv run mypy app

      - name: Pytest (unit + smoke)
        working-directory: backend
        run: uv run pytest -q

      - name: Pytest (Postgres integration)
        working-directory: backend
        env:
          TEST_DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: uv run pytest -q tests/test_eval.py tests/test_memory.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: npm ci && npm run build
