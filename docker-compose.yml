services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nba
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nba"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nba
    # Direct API/docs on :8001 (avoids clashing with a local uvicorn on :8000).
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./mcp_servers:/app/mcp_servers:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://127.0.0.1:8000/api/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
